- rule_id: N97_GPREF_001
  rule_type: GUIDANCE_PREF
  nota: '97'
  version: 3.3.0
  description_it: 'Preferire DOAC: TTR<70% o difficoltà monitoraggio INR.'
  evaluation_order: 40
  detail: 'Preferire DOAC: TTR sotto 70% oppure difficoltà nel monitoraggio dell''INR.'
  normative_anchor:
    pdf_file: nota-97.pdf
    page: 4
    section: Percorso D — DOAC preferibili
    excerpt: '"I NAO/DOAC sono generalmente preferibili: per i pazienti che sono già in trattamento con AVK con scarsa qualità del controllo (Tempo nel Range Terapeutico (TTR) <70% o percentuale dei controlli
      in range <60% negli ultimi 6 mesi) e/o oggettive difficoltà ad accedere ad un regolare monitoraggio dell''INR"'
  structured_motivation:
    rationale_it: In pazienti con TTR instabile o difficoltà pratiche di monitoraggio, i DOAC offrono un profilo più maneggevole.
    clinical_impact: Preferenza clinica (non vincolante).
  condition:
    operator: OR
    operands:
    - operator: IS_TRUE
      var: ttr_sotto_70
    - operator: IS_TRUE
      var: difficolta_monitoraggio_inr
- rule_id: N97_GPREF_002
  rule_type: GUIDANCE_PREF
  nota: '97'
  version: 3.3.0
  description_it: 'Preferire AVK: VFG<15 o interazioni farmacologiche con DOAC.'
  evaluation_order: 41
  detail: 'Preferire AVK: VFG < 15 ml/min oppure interazioni farmacologiche con DOAC documentate.'
  normative_anchor:
    pdf_file: nota-97.pdf
    page: 4
    section: Percorso D
    excerpt: '"Gli AVK sono generalmente preferibili: per i pazienti con grave riduzione della funzionalità renale (VFG <15 mL/min); per i pazienti che assumono farmaci che potrebbero interferire con i
      NAO/DOAC"'
  structured_motivation:
    rationale_it: In insufficienza renale molto grave (VFG<15) o con farmaci che interagiscono significativamente con i DOAC, il warfarin può essere più sicuro.
    clinical_impact: Preferenza clinica (non vincolante).
  condition:
    operator: OR
    operands:
    - operator: LT
      left:
        operator: VAR
        name: vfg_cockroft_gault
      right:
        operator: LITERAL
        value: 15
      type_domain: numeric
    - operator: IS_TRUE
      var: interazioni_farmacologiche_doac
