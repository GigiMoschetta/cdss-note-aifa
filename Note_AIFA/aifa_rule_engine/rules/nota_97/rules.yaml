- rule_id: N97_EXCL_HARD_003
  rule_type: EXCL_HARD
  nota: '97'
  version: 3.3.0
  description_it: Dabigatran controindicato se VFG < 30 ml/min.
  evaluation_order: 12
  normative_anchor:
    pdf_file: nota-97-all-2.pdf
    page: 6
    section: Tab. 4
    excerpt: Controindicato se VFG* <30 ml/min
  structured_motivation:
    rationale_it: Il dabigatran è controindicato in insufficienza renale grave (VFG < 30 ml/min) per l'accumulo del farmaco.
    clinical_impact: NON_RIMBORSABILE.
  condition:
    operator: AND
