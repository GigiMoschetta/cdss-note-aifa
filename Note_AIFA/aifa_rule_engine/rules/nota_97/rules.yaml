- rule_id: N97_SCOPE_001
  rule_type: SCOPE
  nota: '97'
  version: 3.3.0
  description_it: Diagnosi di FA non valvolare (FANV) confermata con ECG e valutazione clinica.
  evaluation_order: 1
  normative_anchor:
    pdf_file: nota-97.pdf
    page: 1
    section: Percorso A
    excerpt: sempre confermata da un elettrocardiogramma e dalla valutazione clinica
  structured_motivation:
    rationale_it: La rimborsabilità degli anticoagulanti orali con Nota 97 presuppone diagnosi di FANV documentata (ECG) e valutazione clinica effettuata.
    clinical_impact: Diagnosi non confermata → NON_RIMBORSABILE.
  condition:
    operator: AND
    operands:
    - operator: IS_TRUE
      var: diagnosi_fanv
    - operator: IS_TRUE
      var: ecg_confermato
    - operator: IS_TRUE
      var: valutazione_clinica_eseguita
- rule_id: N97_EXCL_HARD_001
  rule_type: EXCL_HARD
  nota: '97'
  version: 3.3.0
  description_it: 'Protesi valvolari meccaniche: i DOAC sono controindicati.'
  evaluation_order: 10
  normative_anchor:
    pdf_file: nota-97.pdf
    page: 4
    section: Controindicazioni
    excerpt: anticoagulante indicato per i pazienti con protesi valvolari cardiache meccaniche
  structured_motivation:
    rationale_it: I DOAC non sono approvati per pazienti con protesi valvolari meccaniche; in questi pazienti rimane indicato il warfarin/acenocumarolo.
    clinical_impact: NON_RIMBORSABILE per DOAC in presenza di protesi meccaniche.
  condition:
    operator: AND
    operands:
    - operator: IS_TRUE
      var: protesi_valvolari_meccaniche
    - operator: IN
      var: farmaco
      allowed_set:
      - apixaban
      - dabigatran
      - edoxaban
      - rivaroxaban
- rule_id: N97_EXCL_HARD_002
  rule_type: EXCL_HARD
  nota: '97'
  version: 3.3.0
  description_it: 'FA valvolare (stenosi mitralica reumatica): i DOAC sono controindicati.'
  evaluation_order: 11
  normative_anchor:
    pdf_file: nota-97.pdf
    page: 4
    section: Controindicazioni
    excerpt: base reumatica, sostanzialmente la stenosi mitralica moderata o grave
  structured_motivation:
    rationale_it: La FA valvolare (stenosi mitralica reumatica moderata-grave) richiede la terapia con AVK; i DOAC non sono indicati.
    clinical_impact: NON_RIMBORSABILE per DOAC in FA valvolare.
  condition:
    operator: AND
    operands:
    - operator: IS_TRUE
      var: fa_valvolare
    - operator: IN
      var: farmaco
      allowed_set:
      - apixaban
      - dabigatran
      - edoxaban
      - rivaroxaban
- rule_id: N97_EXCL_HARD_ALL2_EMORRAGIA
  rule_type: EXCL_HARD
  nota: '97'
  version: 3.4.0
  description_it: 'Controindicazione assoluta: emorragia maggiore in atto. Anticoagulante (AVK o DOAC) NON deve essere iniziato.'
  evaluation_order: 5
  normative_anchor:
    pdf_file: nota-97-all-2.pdf
    page: 2
    section: Principali controindicazioni/avvertenze
    excerpt: '"sconsigliano fortemente l''inizio di una terapia anticoagulante con AVK o NAO/DOAC: una emorragia maggiore in atto"'
  structured_motivation:
    rationale_it: Una emorragia maggiore in atto è incompatibile con l'inizio di una terapia anticoagulante (peggiorerebbe il sanguinamento). PDF Allegato 2 esplicita il termine "sconsigliano fortemente";
      modellata come EXCL_HARD per safety.
    clinical_impact: NON_RIMBORSABILE per qualunque AVK/DOAC.
  condition:
    operator: IS_TRUE
    var: emorragia_maggiore_in_atto
- rule_id: N97_EXCL_HARD_ALL2_DIATESI
  rule_type: EXCL_HARD
  nota: '97'
  version: 3.4.0
  description_it: 'Controindicazione assoluta: diatesi emorragica congenita nota.'
  evaluation_order: 6
  normative_anchor:
    pdf_file: nota-97-all-2.pdf
    page: 2
    section: Principali controindicazioni/avvertenze
    excerpt: una diatesi emorragica congenita nota
  structured_motivation:
    rationale_it: Le diatesi emorragiche congenite (es. emofilia, von Willebrand) aumentano il rischio di sanguinamento spontaneo; aggiungere un anticoagulante è controindicato.
    clinical_impact: NON_RIMBORSABILE per qualunque AVK/DOAC.
  condition:
    operator: IS_TRUE
    var: diatesi_emorragica_congenita
- rule_id: N97_EXCL_HARD_ALL2_GRAVIDANZA
  rule_type: EXCL_HARD
  nota: '97'
  version: 3.4.0
  description_it: 'Controindicazione assoluta: gravidanza.'
  evaluation_order: 7
  normative_anchor:
    pdf_file: nota-97-all-2.pdf
    page: 2
    section: Principali controindicazioni/avvertenze
    excerpt: '"sconsigliano fortemente l''inizio di una terapia anticoagulante con AVK o NAO/DOAC: la gravidanza"'
  structured_motivation:
    rationale_it: AVK (warfarin, acenocumarolo) sono teratogeni nel I trimestre; i DOAC hanno dati di sicurezza in gravidanza insufficienti. Il PDF AIFA "sconsiglia fortemente" l'inizio di entrambe le classi.
    clinical_impact: NON_RIMBORSABILE per qualunque AVK/DOAC.
  condition:
    operator: IS_TRUE
    var: gravidanza
- rule_id: N97_EXCL_HARD_ALL2_IPERSENSIBILITA
  rule_type: EXCL_HARD
  nota: '97'
  version: 3.4.0
  description_it: 'Controindicazione assoluta: ipersensibilità documentata al farmaco.'
  evaluation_order: 8
