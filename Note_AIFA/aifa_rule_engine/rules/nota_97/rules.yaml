        name: vfg_cockroft_gault
      right:
        operator: LITERAL
        value: 30
      type_domain: numeric
- rule_id: N97_PATH_001
  rule_type: PATHWAY
  nota: '97'
  version: 3.3.0
  description_it: 'Soglia CHA2DS2-VASc: ≥2 (M) o ≥3 (F) per rimborsabilità. Thresholds OCR-corrected per VEP-1.1 (nota-97.pdf p.3).'
  evaluation_order: 20
  normative_anchor:
    pdf_file: nota-97.pdf
    page: 3
    section: Percorso C
    excerpt: '"in tutti i pazienti con punteggio CHA2DS2-VASc: >2 (se maschi) e >3 (se femmine)"'
  structured_motivation:
    rationale_it: 'Il testo della Nota riporta letteralmente ">2 (se maschi) e >3 (se femmine)"; la soglia è operazionalizzata come ≥2 (M) e ≥3 (F), coerente con la raccomandazione di Classe I delle linee guida ESC sul CHA2DS2-VASc cui la Nota stessa rinvia (la dicitura ">2/>3" è ritenuta imprecisione redazionale per ≥2/≥3, dato che con punteggi interi ">2" escluderebbe erroneamente il valore 2 raccomandato da ESC). Uso di intervallo aritmetico (V3 Fix 1.1) per gestire componenti mancanti.'
    clinical_impact: Score insufficiente → NON_RIMBORSABILE.
  condition:
    operator: SCORE_RANGE_GTE
    score_range_var: cha2ds2vasc_range
    threshold_var: cha2ds2vasc_threshold
    anchor_note: '97'
- rule_id: N97_GDOSE_001
  rule_type: GUIDANCE_DOSE
  nota: '97'
  version: 3.3.0
  flag_type: DOSE_RIDOTTA
  description_it: 'Dabigatran 110mg×2/die: età ≥80 anni OPPURE se associato a verapamil. (V3.2 corrected: OR(eta≥80, uso_verapamil). V3.3 Patch 6: GTE inclusive.)'
  evaluation_order: 30
  detail: 'Dabigatran dose ridotta: 110 mg × 2/die — età ≥80 anni oppure, se associato a verapamil.'
  normative_anchor:
    pdf_file: nota-97-all-2.pdf
    page: 6
    section: Tab. 4
    excerpt: " età >80 anni oppure, se associato a verapamil: \n fra i 75 e gli 80 anni"
  structured_motivation:
    rationale_it: 'Block A di Tab.4 (V3.2 visual correction): età ≥80 oppure uso verapamil sono trigger co-equivalenti per la dose ridotta di 110mg.'
    clinical_impact: Dose ridotta raccomandata.
  condition:
    operator: AND
    operands:
    - operator: EQ
      left:
        operator: VAR
        name: farmaco
      right:
        operator: LITERAL
        value: dabigatran
      type_domain: string
    - operator: OR
      operands:
      - operator: GTE
        left:
          operator: VAR
          name: paziente_eta
        right:
          operator: LITERAL
          value: 80
        type_domain: numeric
      - operator: IS_TRUE
        var: uso_verapamil
- rule_id: N97_GDOSE_002
  rule_type: GUIDANCE_DOSE
  nota: '97'
  version: 3.3.0
  flag_type: DOSE_RIDOTTA
  description_it: 'Apixaban 2.5mg×2/die: ≥2 criteri su 3 (età≥80, peso≤60kg, creat≥1.5mg/dl). Operatori inclusivi (GTE/LTE) per VEP-1.6 / V3.3 Patch 6.'
  evaluation_order: 31
  detail: 'Apixaban dose ridotta: 2.5 mg × 2/die — ≥2 delle seguenti: età ≥80 anni, peso ≤60 kg, creatinina ≥1.5 mg/dl.'
  normative_anchor:
    pdf_file: nota-97-all-2.pdf
    page: 6
    section: Tab. 4
    excerpt: "In presenza di almeno 2 delle seguenti caratteristiche: \n- Età >80 anni, \n- Peso <60 kg, \n- Creatinina >1,5 mg/dl"
  structured_motivation:
    rationale_it: La riduzione di dose dell'apixaban segue la regola COUNT_GEQ (≥2 criteri su 3). Operatori inclusivi confermati visivamente (VEP-1.6).
    clinical_impact: Dose ridotta raccomandata se 2/3 criteri soddisfatti.
  condition:
    operator: AND
    operands:
    - operator: EQ
      left:
        operator: VAR
        name: farmaco
      right:
        operator: LITERAL
        value: apixaban
      type_domain: string
    - operator: COUNT_GEQ
      threshold: 2
      conditions:
      - operator: GTE
        left:
          operator: VAR
          name: paziente_eta
        right:
          operator: LITERAL
          value: 80
        type_domain: numeric
      - operator: LTE
        left:
          operator: VAR
          name: paziente_peso_kg
        right:
          operator: LITERAL
          value: 60
        type_domain: numeric
      - operator: GTE
        left:
          operator: VAR
          name: creatinina_sierica
        right:
          operator: LITERAL
          value: 1.5
        type_domain: numeric
