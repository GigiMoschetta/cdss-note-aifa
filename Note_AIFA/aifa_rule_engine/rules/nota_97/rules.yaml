- rule_id: N97_GWARN_004
  rule_type: GUIDANCE_WARN
  nota: '97'
  version: 3.3.0
  description_it: 'Dabigatran età 75-80 + (VFG 30-50 o aumentato rischio sanguinamento): decidere caso per caso fra 300 e 220 mg/die. (V3.2: uso_verapamil RIMOSSO dalla condizione — appartiene solo a Block
    A.)'
  evaluation_order: 53
  detail: 'AVVISO dabigatran 75–80 anni: decidere caso per caso fra i due dosaggi (300 o 220 mg/die) — VFG 30–50 ml/min oppure aumentato rischio sanguinamento.'
  normative_anchor:
    pdf_file: nota-97-all-2.pdf
    page: 6
    section: Tab. 4
    excerpt: "calcolata con la formula di Cockgroft-Gault, come da studi clinici 110 mg x 2/die Decidere caso per caso fra i due dosaggi \n(300 o 220 mg/die) \n2,5"
  structured_motivation:
    rationale_it: 'Block B di Tab.4 (V3.2 visual correction): la fascia 75-80 anni con CKD o sanguinamento è oggetto di raccomandazione non deterministica ("caso per caso"). uso_verapamil appartiene esclusivamente
      a Block A.'
    clinical_impact: Avviso — non è una regola di dosaggio deterministica.
  condition:
    operator: AND
    operands:
    - operator: EQ
      left:
        operator: VAR
        name: farmaco
      right:
        operator: LITERAL
        value: dabigatran
      type_domain: string
    - operator: BETWEEN
      var: paziente_eta
      low: 75
      high: 80
    - operator: OR
      operands:
      - operator: BETWEEN
        var: vfg_cockroft_gault
        low: 30
